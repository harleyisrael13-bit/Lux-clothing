<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUX Clothing</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:#fff;
}

header{
padding:25px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #222;
}

.logo{
font-size:32px;
font-weight:bold;
letter-spacing:3px;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
}

.hero{
height:80vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:80px;
margin-bottom:20px;
}

.hero p{
font-size:20px;
color:#aaa;
}

.shop-btn{
margin-top:30px;
padding:15px 35px;
background:white;
color:black;
text-decoration:none;
font-weight:bold;
border-radius:5px;
}

.products{
padding:60px 20px;
}

.products h2{
text-align:center;
margin-bottom:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
max-width:1200px;
margin:auto;
}

.card{
background:#111;
padding:20px;
border-radius:10px;
text-align:center;
}

.card img{
width:100%;
border-radius:10px;
}

.price{
margin-top:10px;
font-size:18px;
font-weight:bold;
}

footer{
padding:30px;
text-align:center;
border-top:1px solid #222;
color:#888;
}
</style>
</head>

<body>

<header>
<div class="logo">LUX</div>

<nav>
<a href="#">Home</a>
<a href="#">Shop</a>
<a href="#">About</a>
</nav>
</header>

<section class="hero">
<h1>LUX</h1>
<p>Luxury Streetwear For The Next Generation</p>
<a href="#shop" class="shop-btn">SHOP NOW</a>
</section>

<section class="products" id="shop">
<h2>Featured Collection</h2>

<div class="grid">

<div class="card">
<img src="https://via.placeholder.com/500x600">
<h3>LUX Tee Black</h3>
<div class="price">$49</div>
</div>

<div class="card">
<img src="https://via.placeholder.com/500x600">
<h3>LUX Tee White</h3>
<div class="price">$49</div>
</div>

<div class="card">
<img src="https://via.placeholder.com/500x600">
<h3>LUX Premium Tee</h3>
<div class="price">$59</div>
</div>

</div>
</section>

<footer>
© 2026 LUX Clothing
</footer>

</body>
</html>
